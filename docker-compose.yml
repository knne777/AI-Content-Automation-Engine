services:
  db:
    image: postgres:15-alpine
    container_name: ai-content-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aicontent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    image: node:22-alpine
    container_name: ai-content-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
    ports:
      - "5173:5173"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-content-engine
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aicontent
    volumes:
      - ./flows:/app/flows
      - ./tools:/app/tools
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
